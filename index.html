<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Viewer</title>
</head>

<body>
    <div>
        <h1>Gold Price</h1>
        <p id="goldPrice"></p>
        <p id="twentyTwoCaratPrice"></p>
    </div>

    <script>
        // JavaScript code for fetching and displaying gold price
        const apiUrl = 'http://bcast.rakshabullion.com:7767/VOTSBroadcastStreaming/Services/xml/GetLiveRateByTemplateID/raksha';
        let goldData = null;
        let twentyTwoCaratPrice = null;

        function getGoldData() {
            const timestamp = Date.now();
            const url = `${apiUrl}?_=${timestamp}`;

            fetch(url)
                .then(response => response.text())
                .then(data => {
                    data.split("\n").forEach(line => {
                        const columns = line.split("\t").map(col => col.trim()).filter(col => !!col);
                        if (columns[1] === "GOLD 999 WITH GST") {
                            goldData = parseInt(columns[3]);
                        }
                    });
                    updateGoldPrice();
                })
                .catch(error => {
                    console.error('Error fetching gold data:', error);
                });
        }

        function caratParser(rate) {
            twentyTwoCaratPrice = (rate * 96) / 100;
        }

        function updateGoldPrice() {
            if (goldData !== null) {
                document.getElementById('goldPrice').textContent = `Gold Price: ${goldData}`;
                caratParser(goldData);
                document.getElementById('twentyTwoCaratPrice').textContent = `22 Carat Price: ${twentyTwoCaratPrice}`;
            }
        }

        // Fetch gold data initially and then at a 5-second interval
        getGoldData();
        setInterval(getGoldData, 5000);
    </script>
</body>

</html>
